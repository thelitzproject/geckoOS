name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize browser.js submodule
        run: git submodule update --init --depth=1 vendor/browser.js

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build browser.js chrome
        working-directory: vendor/browser.js
        run: |
          pnpm install
          pnpm --filter "./packages/chrome" run build -- --base ./

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/dist/

      - uses: actions/deploy-pages@v4
        id: deployment

name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false   # vendor/litzium and vendor/aboutproxy not needed for the build

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── browser.js — restore built dist from cache ────────────────────────
      # Bump .github/browser-js-pin to force a full rebuild on the next deploy.
      - name: Restore browser.js dist cache
        id: cache-browser
        uses: actions/cache@v4
        with:
          path: vendor/browser.js/packages/chrome/dist
          key: browser-js-${{ hashFiles('.github/browser-js-pin') }}

      # ── Toolchains (skipped when dist cache hits) ─────────────────────────

      - name: Set up pnpm
        if: steps.cache-browser.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Rust (stable + wasm32 target)
        if: steps.cache-browser.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache Cargo registry AND compiled CLI binaries together.
      # Key is pinned to browser-js-pin so tools rebuild when we bump it.
      - name: Restore Cargo cache
        if: steps.cache-browser.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-snip
          key: cargo-tools-${{ runner.os }}-${{ hashFiles('.github/browser-js-pin') }}
          restore-keys: cargo-tools-${{ runner.os }}-

      - name: Install WASM build tools
        if: steps.cache-browser.outputs.cache-hit != 'true'
        run: |
          # wasm-opt comes from the binaryen apt package
          sudo apt-get update -q && sudo apt-get install -y binaryen

          # wasm-bindgen CLI — only install if not already in cache
          if ! command -v wasm-bindgen &>/dev/null; then
            cargo install wasm-bindgen-cli
          fi

          # wasm-snip — r58playz fork required by scramjet's build.sh
          if ! command -v wasm-snip &>/dev/null; then
            cargo install --git https://github.com/r58playz/wasm-snip wasm-snip
          fi

          # wasm-pack
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # ── browser.js clone + build ──────────────────────────────────────────

      - name: Clone browser.js
        if: steps.cache-browser.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/thelitzproject/browser.js vendor/browser.js
          git clone --depth=1 https://github.com/MercuryWorkshop/dreamlandjs vendor/browser.js/external/dreamlandjs

      - name: Install browser.js dependencies
        if: steps.cache-browser.outputs.cache-hit != 'true'
        working-directory: vendor/browser.js
        run: |
          # Approve native post-install scripts needed in CI
          printf '\nonlyBuiltDependencies:\n  - esbuild\n  - core-js\n  - bufferutil\n' >> pnpm-workspace.yaml
          pnpm install --frozen-lockfile

      - name: Build scramjet WASM
        if: steps.cache-browser.outputs.cache-hit != 'true'
        working-directory: vendor/browser.js/packages/scramjet/packages/core
        run: pnpm run rewriter:build

      - name: Build browser.js
        if: steps.cache-browser.outputs.cache-hit != 'true'
        working-directory: vendor/browser.js
        run: pnpm run build

      # ── geckoOS build ─────────────────────────────────────────────────────

      - name: Install geckoOS dependencies
        run: npm ci

      - name: Build geckoOS
        run: npm run build

      # ── Deploy ────────────────────────────────────────────────────────────

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/dist/

      - uses: actions/deploy-pages@v4
        id: deployment

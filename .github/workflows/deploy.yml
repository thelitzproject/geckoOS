name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── browser.js — restore built dist from cache ────────────────────────
      # Bump .github/browser-js-pin to force a full rebuild on next deploy.
      - name: Restore browser.js dist cache
        id: cache-browser
        uses: actions/cache@v4
        with:
          path: vendor/browser.js/packages/chrome/dist
          key: browser-js-${{ hashFiles('.github/browser-js-pin') }}

      # Toolchains — only installed on cache miss
      - name: Set up pnpm
        if: steps.cache-browser.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Rust (stable + wasm32 target)
        if: steps.cache-browser.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        if: steps.cache-browser.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Restore Cargo registry cache
        if: steps.cache-browser.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('.github/browser-js-pin') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Clone browser.js
        if: steps.cache-browser.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/thelitzproject/browser.js vendor/browser.js
          git clone --depth=1 https://github.com/MercuryWorkshop/dreamlandjs vendor/browser.js/external/dreamlandjs

      - name: Install browser.js dependencies
        if: steps.cache-browser.outputs.cache-hit != 'true'
        working-directory: vendor/browser.js
        run: |
          # Allow esbuild + core-js post-install scripts (native binaries needed in CI)
          printf '\nonlyBuiltDependencies:\n  - esbuild\n  - core-js\n  - bufferutil\n' >> pnpm-workspace.yaml
          pnpm install --frozen-lockfile

      - name: Build scramjet WASM
        if: steps.cache-browser.outputs.cache-hit != 'true'
        working-directory: vendor/browser.js/packages/scramjet/packages/core
        run: pnpm run rewriter:build

      - name: Build browser.js
        if: steps.cache-browser.outputs.cache-hit != 'true'
        working-directory: vendor/browser.js
        run: pnpm run build

      # ── geckoOS build ─────────────────────────────────────────────────────
      - name: Install geckoOS dependencies
        run: npm ci

      - name: Build geckoOS
        run: npm run build

      # ── Deploy ────────────────────────────────────────────────────────────
      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/dist/

      - uses: actions/deploy-pages@v4
        id: deployment

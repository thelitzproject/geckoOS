<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#5856d6"/>
  <rect x="14" y="22" width="72" height="56" rx="7" fill="white" opacity="0.18"/>
  <rect x="14" y="22" width="72" height="56" rx="7" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  <!-- Sky gradient area -->
  <clipPath id="frame">
    <rect x="14" y="22" width="72" height="56" rx="7"/>
  </clipPath>
  <g clip-path="url(#frame)">
    <rect x="14" y="22" width="72" height="56" fill="#a78bfa" opacity="0.25"/>
    <!-- Mountains -->
    <polygon points="14,78 38,44 62,78" fill="white" opacity="0.22"/>
    <polygon points="44,78 65,50 86,78" fill="white" opacity="0.32"/>
    <!-- Sun/circle -->
    <circle cx="72" cy="36" r="10" fill="#fde68a" opacity="0.9"/>
    <circle cx="72" cy="36" r="10" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Frame border -->
  <rect x="14" y="22" width="72" height="56" rx="7" fill="none" stroke="white" stroke-width="2.5" opacity="0.6"/>
</svg>

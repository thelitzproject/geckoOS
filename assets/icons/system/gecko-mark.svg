<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#eab308"/>
    </radialGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="50" cy="58" rx="30" ry="26" fill="url(#bg)"/>
  <!-- Head -->
  <ellipse cx="50" cy="32" rx="22" ry="20" fill="url(#bg)"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="28" rx="6" ry="7" fill="url(#eye-glow)"/>
  <ellipse cx="58" cy="28" rx="6" ry="7" fill="url(#eye-glow)"/>
  <!-- Pupils -->
  <ellipse cx="43" cy="29" rx="3" ry="4" fill="#1c1c1e"/>
  <ellipse cx="59" cy="29" rx="3" ry="4" fill="#1c1c1e"/>
  <!-- Eye shine -->
  <circle cx="44" cy="27" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="60" cy="27" r="1.2" fill="white" opacity="0.8"/>
  <!-- Smile -->
  <path d="M42 40 Q50 46 58 40" stroke="#0f5132" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M78 62 Q92 55 88 70 Q84 80 72 74" fill="#16a34a" stroke="#0f5132" stroke-width="1"/>
  <!-- Legs -->
  <ellipse cx="30" cy="80" rx="7" ry="5" fill="#15803d" transform="rotate(-20 30 80)"/>
  <ellipse cx="70" cy="80" rx="7" ry="5" fill="#15803d" transform="rotate(20 70 80)"/>
</svg>
